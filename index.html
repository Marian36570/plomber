        .service-item {

        .service-name { font-size: 13px; font-weight: 700; color: #444; }

        /* ПОКРАЩЕНІ РАЙОНИ */
        .badge-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .badge { 
            background: #fff; color: var(--primary); padding: 8px 16px; border-radius: 12px; 
            font-size: 13px; font-weight: 700; border: 1px solid #e0e6ed;
            transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .badge:hover { background: var(--primary); color: white; border-color: var(--primary); }
        .badge.highlight { background: #eef3ff; border-color: var(--primary); }

        .review { border-bottom: 1px solid #f0f0f0; padding: 15px 0; }
        .review:last-child { border-bottom: none; }
        .review-name { font-weight: 700; font-size: 14px; color: #222; }
        .review-stars { color: #ffcc00; font-size: 12px; margin: 4px 0; display: block; }
        .review-text { font-style: italic; font-size: 13px; color: #666; line-height: 1.4; }

        .btn-whatsapp { 
            display: flex; align-items: center; justify-content: center;
            background: var(--success); color: white; padding: 18px; 
            text-decoration: none; border-radius: 18px; font-weight: bold; 
            font-size: 18px; box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
            transition: 0.3s;
        }
        .btn-whatsapp:hover { transform: scale(1.02); box-shadow: 0 12px 25px rgba(37, 211, 102, 0.4); }

        footer { text-align: center; padding: 40px 20px; color: #aaa; font-size: 11px; letter-spacing: 1px; }
    </style>
