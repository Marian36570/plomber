<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artisan Pro | Plomberie & Rénovation</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0056b3; --success: #25D366; --bg: #f4f7f9; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; background-color: var(--bg); color: #333; line-height: 1.6; }
        
        header { 
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://images.unsplash.com/photo-1581244277943-fe4a9c777189?auto=format&fit=crop&q=80&w=1000'); 
            background-size: cover; background-position: center;
            color: white; padding: 60px 20px 80px; text-align: center;
            clip-path: polygon(0 0, 100% 0, 100% 90%, 0% 100%);
        }

        .container { max-width: 500px; margin: 0 auto 40px; padding: 0 15px; position: relative; z-index: 2; }

        .lang-picker { 
            display: flex; justify-content: center; gap: 8px; 
            margin: -30px auto 25px; background: white; padding: 10px; border-radius: 50px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); width: fit-content;
        }
        .lang-btn { cursor: pointer; border: 1px solid #eee; background: white; font-size: 14px; padding: 8px 14px; border-radius: 25px; font-weight: bold; transition: 0.3s; }
        .lang-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .card { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.03); }
        
        h1 { margin: 0; font-size: 26px; text-transform: uppercase; letter-spacing: 2px; }
        .subtitle { font-size: 16px; opacity: 0.9; margin-top: 10px; font-weight: bold; }
        
        h3 { margin-top: 0; color: #1a1a1a; font-size: 18px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        /* ТАБЛИЦЯ ПОСЛУГ */
        .services-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .service-item { 
            background: #f8f9fa; padding: 20px 10px; border-radius: 18px; text-align: center; 
            border: 1px solid rgba(0,0,0,0.05); transition: 0.3s;
        }
        .service-icon { font-size: 30px; display: block; margin-bottom: 8px; }
        .service-name { font-size: 13px; font-weight: 700; color: #444; }

        /* РАЙОНИ */
        .badge-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .badge { 
            background: #eef3ff; color: var(--primary); padding: 6px 14px; border-radius: 12px; 
            font-size: 12px; font-weight: 700; border: 1px solid #d0dfff;
        }

        .review { border-bottom: 1px solid #eee; padding: 15px 0; }
        .review:last-child { border-bottom: none; }
        .review-name { font-weight: bold; font-size: 14px; }
        .review-stars { color: #ffcc00; font-size: 12px; margin-bottom: 5px; display: block; }
        .review-text { font-style: italic; font-size: 13px; color: #666; }

        .btn-whatsapp { 
            display: flex; align-items: center; justify-content: center;
            background: var(--success); color: white; padding: 18px; 
            text-decoration: none; border-radius: 18px; font-weight: bold; 
            font-size: 18px; box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2);
        }

        footer { text-align: center; padding: 30px 20px; color: #aaa; font-size: 11px; }
    </style>
</head>
<body>

<header>
    <h1>Artisan Pro</h1>
    <div class="subtitle" id="main-subtitle">Plomberie & Rénovation</div>
</header>

<div class="container">
    <div class="lang-picker">
        <button class="lang-btn active" id="btn-fr" onclick="setLang('fr')">🇫🇷 FR</button>
        <button class="lang-btn" id="btn-ua" onclick="setLang('ua')">🇺🇦 UA</button>
        <button class="lang-btn" id="btn-pl" onclick="setLang('pl')">🇵🇱 PL</button>
    </div>

    <div class="card">
        <h3 id="sec1-title">🛁 Domaines d'expertise</h3>
        <div class="services-grid">
            <div class="service-item"><span class="service-icon">🚿</span><span class="service-name" id="s1">Salle de Bain</span></div>
            <div class="service-item"><span class="service-icon">🚰</span><span class="service-name" id="s2">Plomberie</span></div>
            <div class="service-item"><span class="service-icon">🍳</span><span class="service-name" id="s3">Cuisine</span></div>
            <div class="service-item"><span class="service-icon">🧱</span><span class="service-name" id="s4">Carrelage</span></div>
        </div>
    </div>

    <div class="card">
        <h3 id="sec2-title">📍 Zone d'intervention</h3>
        <p style="font-size: 14px; color: #666; margin-bottom: 15px;" id="sec2-text">Je me déplace à Paris et en Île-de-France :</p>
        <div class="badge-list">
            <span class="badge">Paris (75)</span><span class="badge">77</span><span class="badge">78</span><span class="badge">91</span>
            <span class="badge">92</span><span class="badge">93</span><span class="badge">94</span><span class="badge">95</span>
        </div>
    </div>

    <div class="card">
        <h3 id="reviews-title">⭐ Avis Clients</h3>
        <div id="reviews-container">
            </div>
    </div>

    <div class="card" style="text-align: center; border: none; background: #eef3ff;">
        <p id="contact-text" style="margin-bottom: 15px;"><strong>Estimation gratuite par photo</strong></p>
        <a href="https://wa.me/33782006584" class="btn-whatsapp" id="wa-btn">💬 WhatsApp Message</a>
    </div>
</div>

<footer>&copy; 2026 EXPERT RÉNOVATION PARIS</footer>

<script>
    const translations = {
        fr: {
            subtitle: "Plomberie & Rénovation",
            sec1: "🛁 Domaines d'expertise",
            s: ["Salle de Bain", "Plomberie", "Cuisine", "Carrelage"],
            sec2: "📍 Zone d'intervention",
            sec2t: "Je me déplace à Paris et en Île-de-France :",
            revTitle: "⭐ Avis Clients",
            revs: [{n:"Jean-Pierre L.",t:"Travail très propre. Artisan sérieux."}, {n:"Marc D.",t:"Prix correct. Je recommande !"}],
            contact: "Estimation gratuite par photo",
            wa: "💬 WhatsApp Message"
        },
        ua: {
            subtitle: "Сантехніка та Ремонт",
            sec1: "🛁 Сфери роботи",
            s: ["Ванна кімната", "Сантехніка", "Кухня", "Плитка"],
            sec2: "📍 Де я працюю",
            sec2t: "Виїжджаю по Парижу та всьому регіону Île-de-France:",
            revTitle: "⭐ Відгуки клієнтів",
            revs: [{n:"Жан-П'єр Л.",t:"Дуже чиста робота. Серйозний майстер."}, {n:"Марк Д.",t:"Адекватна ціна. Рекомендую!"}],
            contact: "Безкоштовна оцінка по фото",
            wa: "💬 Написати у WhatsApp"
        },
        pl: {
            subtitle: "Hydraulika i Remonty",
            sec1: "🛁 Obszary prac",
            s: ["Łazienka", "Hydraulika", "Kuchnia", "Płytki"],
            sec2: "📍 Gdzie pracuję",
            sec2t: "Pracuję w Paryżu i całym regionie Île-de-France:",
            revTitle: "⭐ Opinie klientów",
            revs: [{n:"Jean-Pierre L.",t:"Bardzo czysta praca. Polecam."}, {n:"Marc D.",t:"Uczciwa cena i szybko!"}],
            wa: "💬 Napisz na WhatsApp"
        }
    };

    function setLang(lang) {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + lang).classList.add('active');
        const t = translations[lang];

        document.getElementById('main-subtitle').innerText = t.subtitle;
        document.getElementById('sec1-title').innerText = t.sec1;
        document.getElementById('s1').innerText = t.s[0];
        document.getElementById('s2').innerText = t.s[1];
        document.getElementById('s3').innerText = t.s[2];
        document.getElementById('s4').innerText = t.s[3];
        document.getElementById('sec2-title').innerText = t.sec2;
        document.getElementById('sec2-text').innerText = t.sec2t;
        document.getElementById('reviews-title').innerText = t.revTitle;
        document.getElementById('contact-text').innerHTML = `<strong>${t.contact}</strong>`;
        document.getElementById('wa-btn').innerText = t.wa;

        const revContainer = document.getElementById('reviews-container');
        revContainer.innerHTML = '';
        t.revs.forEach(r => {
            revContainer.innerHTML += `
                <div class="review">
                    <span class="review-name">${r.n}</span>
                    <span class="review-stars">⭐⭐⭐⭐⭐</span>
                    <p class="review-text">"${r.t}"</p>
                </div>`;
        });
    }
    setLang('fr');
</script>
</body>
</html>
