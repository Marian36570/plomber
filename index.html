<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artisan Pro | Plomberie & Rénovation</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0056b3; --success: #25D366; --accent: #ffcc00; }
        
        body {

            background: #f4f7f9 url('https://images.unsplash.com/photo-1584622650111-993a426fbf0a?auto=format&fit=crop&q=80&w=1500') no-repeat center center fixed;
            background-size: cover; color: #333; 
        }
        
        header { 
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://images.unsplash.com/photo-1581244277943-fe4a9c777189?auto=format&fit=crop&q=80&w=1000'); 
            background-size: cover; background-position: center; color: white; padding: 50px 20px; text-align: center;
            clip-path: polygon(0 0, 100% 0, 100% 90%, 0% 100%);
        }

        .container { max-width: 500px; margin: 0 auto 30px; padding: 0 15px; position: relative; }

        .lang-picker { 
            display: flex; justify-content: center; gap: 8px; margin: -20px auto 20px; 
            background: white; padding: 8px; border-radius: 50px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: fit-content;
        }
        .lang-btn { cursor: pointer; border: 1px solid #eee; background: white; font-size: 13px; padding: 6px 12px; border-radius: 20px; font-weight: bold; }
        .lang-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .card { background: rgba(255, 255, 255, 0.97); padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        
        h3 { margin-top: 0; color: #1a1a1a; font-size: 16px; margin-bottom: 15px; text-transform: uppercase; border-left: 4px solid var(--primary); padding-left: 10px; }

        /* КОЛЬОРОВІ ПОСЛУГИ */
        .services-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .service-item { padding: 15px 5px; border-radius: 18px; text-align: center; border: 1px solid rgba(0,0,0,0.05); }
        .s-blue { background: #e3f2fd; }
        .s-teal { background: #e0f2f1; }
        .s-orange { background: #fff3e0; }
        .s-purple { background: #f3e5f5; }
        .service-icon { font-size: 28px; display: block; margin-bottom: 5px; }
        .service-name { font-size: 12px; font-weight: 700; color: #333; }

        /* ЕТАПИ */
        .steps-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .step-box { padding: 12px; background: white; border-radius: 15px; border-bottom: 3px solid var(--primary); text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .step-num { background: var(--primary); color: white; width: 20px; height: 20px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; margin-bottom: 5px; }

        .badge-list { display: flex; flex-wrap: wrap; gap: 5px; }
        .badge { background: white; color: var(--primary); padding: 5px 10px; border-radius: 10px; font-size: 11px; font-weight: bold; border: 1px solid var(--primary); }
